# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net
name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore console-shopping.csproj

    - name: Build
      run: dotnet build console-shopping.csproj --no-restore

    - name: Test
      run: dotnet test console-shopping.csproj --no-build --verbosity normal

    - name: Run Tests
      run:  dotnet test .\tests\ConsoleShoppingApp.Tests\ConsoleShoppingApp.Tests.csproj -v n
